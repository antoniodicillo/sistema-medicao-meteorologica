{% extends "base.html" %} {% block title %}Painel{% endblock %} {% block
main_attrs %}data-page="index"{% endblock %} {% block content %}
<div class="mb-6">
  <h1 class="text-2xl font-bold tracking-tight">Painel</h1>
  <p class="mt-1 text-sm text-muted-foreground">
    Últimas leituras do banco (temperatura, umidade e timestamp).
  </p>
</div>

<section class="card">
  <div class="card__header">
    <div class="flex items-center gap-2">
      <span class="dot" aria-hidden="true"></span>
      <span id="updateStatus" class="text-sm font-medium text-muted-foreground"
        >Carregando…</span
      >
    </div>
  </div>

  <div class="card__content grid gap-4">
    <div
      id="cards"
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3"
      aria-live="polite"
    ></div>

    <div class="rounded-xl border overflow-auto">
      <table class="table" aria-label="Últimas leituras">
        <thead>
          <tr>
            <th>ID</th>
            <th>Temperatura</th>
            <th>Umidade</th>
            <th>Pressão</th>
            <th>Timestamp</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="latestTable"></tbody>
      </table>
    </div>
  </div>
</section>
{% endblock %}
