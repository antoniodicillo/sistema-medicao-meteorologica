{% extends "base.html" %} {% block title %}Editar leitura{% endblock %} {% block
main_attrs %}data-page="editar" data-id="{{ id }}"{% endblock %} {% block
content %}
<div class="mb-6 flex items-start justify-between gap-4">
  <div>
    <h1 class="text-2xl font-bold tracking-tight">Editar leitura</h1>
    <p class="mt-1 text-sm text-muted-foreground">
      Atualize os valores e salve.
    </p>
  </div>

  <a class="btn btn--ghost" href="/historico">Voltar</a>
</div>

<section class="card">
  <div class="card__header">
    <span id="editarStatus" class="text-sm font-medium text-muted-foreground"
      >Carregando…</span
    >
  </div>

  <div class="card__content">
    <form id="editarForm" class="grid gap-4" autocomplete="off">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <label class="grid gap-1">
          <span class="text-sm font-medium">ID</span>
          <input
            class="rounded-md border bg-background px-3 py-2"
            id="id"
            name="id"
            type="text"
            readonly
            value="{{ id }}"
          />
        </label>

        <label class="grid gap-1">
          <span class="text-sm font-medium">Timestamp</span>
          <input
            class="rounded-md border bg-background px-3 py-2"
            id="timestamp"
            name="timestamp"
            type="text"
            readonly
          />
        </label>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
        <label class="grid gap-1">
          <span class="text-sm font-medium">Temperatura</span>
          <input
            class="rounded-md border bg-background px-3 py-2"
            id="temperatura"
            name="temperatura"
            type="number"
            step="0.01"
            required
          />
        </label>

        <label class="grid gap-1">
          <span class="text-sm font-medium">Umidade</span>
          <input
            class="rounded-md border bg-background px-3 py-2"
            id="umidade"
            name="umidade"
            type="number"
            step="0.01"
            required
          />
        </label>

        <label class="grid gap-1">
          <span class="text-sm font-medium">Pressão</span>
          <input
            class="rounded-md border bg-background px-3 py-2"
            id="pressao"
            name="pressao"
            type="number"
            step="0.01"
            placeholder="Opcional"
          />
        </label>
      </div>

      <div class="flex justify-end">
        <button class="btn btn--primary" id="salvarBtn" type="submit">
          Salvar
        </button>
      </div>
    </form>
  </div>
</section>
{% endblock %}
