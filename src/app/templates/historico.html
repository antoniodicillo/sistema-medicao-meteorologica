{% extends "base.html" %} {% block title %}Histórico{% endblock %} {% block
main_attrs %}data-page="historico"{% endblock %} {% block content %}
<div class="mb-6">
  <h1 class="text-2xl font-bold tracking-tight">Histórico</h1>
  <p class="mt-1 text-sm text-muted-foreground">
    Todas as leituras. Role para carregar mais itens.
  </p>
</div>

<section class="card">
  <div class="card__header">
    <span id="historicoStatus" class="text-sm font-medium text-muted-foreground"
      >Carregando…</span
    >
  </div>

  <div class="card__content">
    <div class="rounded-xl border overflow-auto" id="historicoScroll">
      <table class="table" aria-label="Histórico de leituras">
        <thead>
          <tr>
            <th>ID</th>
            <th>Temperatura</th>
            <th>Umidade</th>
            <th>Pressão</th>
            <th>Localização</th>
            <th>Timestamp</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="historicoTable"></tbody>
      </table>
      <div id="sentinel" style="height: 1px"></div>
    </div>
  </div>
</section>
{% endblock %}
